<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login form</title>
    <link rel="stylesheet" href="style.css" />
    <script
      src="https://kit.fontawesome.com/9320236c90.js"
      crossorigin="anonymous"
    ></script>
  </head>
  <body>
    <div id="wrapped">
      <form action="" id="login-form">
        <h1 class="form_heading">Form đăng nhập</h1>

        <div class="form_group">
          <i class="fa-solid fa-user"></i>
          <input type="text" class="form_input" placeholder="Tên đăng nhập" />
        </div>

        <div class="form_group">
          <i class="fa-solid fa-key"></i>
          <input type="password" class="form_input" placeholder="Mật khẩu" />
          <div id="eye"><i class="fa-regular fa-eye"></i></div>
        </div>

        <input type="submit" value="Đăng Nhập" class="form_submit" />
      </form>
    </div>
  </body>
</html>
